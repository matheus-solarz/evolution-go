services:
  evolution-go:
    build:
      context: .
      dockerfile: Dockerfile
    image: evolution-go:local
    container_name: evolution-go
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      CLIENT_NAME: evolution

      GLOBAL_API_KEY: "429683C4C977415CAAFCCE10F7D57E11"

      POSTGRES_AUTH_DB: "postgresql://postgres:postgres@postgres:5432/evogo_auth?sslmode=disable"
      POSTGRES_USERS_DB: "postgresql://postgres:postgres@postgres:5432/evogo_users?sslmode=disable"
      DATABASE_SAVE_MESSAGES: "true"

      WADEBUG: DEBUG
      LOGTYPE: console
      LOG_DIRECTORY: /app/logs

      CONNECT_ON_STARTUP: "false"
      WEBHOOK_FILES: "true"
      OS_NAME: "Evolution GO"

      AMQP_GLOBAL_ENABLED: "false"
      NATS_GLOBAL_ENABLED: "false"

      MINIO_ENABLED: "true"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: evolution-media
      MINIO_USE_SSL: "false"

      EVENT_IGNORE_GROUP: "false"
      EVENT_IGNORE_STATUS: "true"
      QRCODE_MAX_COUNT: "5"
    volumes:
      - evolution_data:/app/dbdata
      - evolution_logs:/app/logs
    networks:
      - evolution_network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/examples/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - evolution_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: evolution-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - evolution_network

volumes:
  evolution_data:
  evolution_logs:
  postgres_data:
  minio_data:

networks:
  evolution_network:
    driver: bridge
